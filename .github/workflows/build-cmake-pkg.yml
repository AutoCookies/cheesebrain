name: Build relocatable cmake package
on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
      -   submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential tcl

      - name: Build
        run: |
          PREFIX="$(pwd)"/inst
          cmake -S . -B build -DCMAKE_PREFIX_PATH="$PREFIX" \
                -DCHEESE_OPENSSL=OFF -DCHEESE_BUILD_TESTS=OFF -DCHEESE_BUILD_TOOLS=OFF \
                -DCHEESE_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cmake --install build --prefix "$PREFIX" --config Release

          export CHEESE_CONFIG="$PREFIX"/lib/cmake/cheese/cheese-config.cmake
          tclsh <<'EOF'
          set build(commit)  [string trim [exec git rev-parse --short HEAD]]
          set build(number)  [string trim [exec git rev-list  --count HEAD]]
          set build(version) "0.0.$build(number)"

          set cheeseconfig [read [open "$env(CHEESE_CONFIG)" r]]
          set checks [list "set\\(CHEESE_VERSION     \\s+$build(version)\\)" \
                           "set\\(CHEESE_BUILD_COMMIT\\s+$build(commit)\\)" \
                           "set\\(CHEESE_BUILD_NUMBER\\s+$build(number)\\)"]

          puts -nonewline "Checking cheese-config.cmake version... "
          foreach check $checks {
              if {![regexp -expanded -- $check $cheeseconfig]} {
                  puts "\"$check\" failed!"
                  exit 1
              }
          }
          puts "success."
          EOF

          cd examples/simple-cmake-pkg
          cmake -S . -B build -DCMAKE_PREFIX_PATH="$PREFIX"/lib/cmake
          cmake --build build
